<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Set Password — PolyVision</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060B14; background-image: radial-gradient(ellipse at 50% 0%, rgba(16,216,107,0.04) 0%, transparent 60%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    color: #E8EDF3; padding: 20px;
  }
  .card {
    max-width: 400px; width: 100%;
    background: rgba(14, 20, 32, 0.85);
    border: 1px solid rgba(30, 43, 62, 0.6);
    border-radius: 24px; padding: 40px 32px;
    backdrop-filter: blur(24px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .logo-wrap { text-align: center; margin-bottom: 24px; }
  .logo-wrap img { width: 56px; height: 56px; border-radius: 14px; }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.4px; text-align: center; margin-bottom: 6px; }
  .sub { color: #6E7A8E; font-size: 13px; text-align: center; margin-bottom: 28px; line-height: 1.5; }
  .error { background: rgba(240,90,126,0.08); border: 1px solid rgba(240,90,126,0.2); border-radius: 10px; padding: 10px 14px; color: #F05A7E; font-size: 12px; margin-bottom: 14px; display: none; }
  .error.show { display: block; }
  .field { margin-bottom: 18px; position: relative; }
  .field label { display: block; font-size: 10px; color: #6E7A8E; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%; padding: 13px 44px 13px 14px;
    font-size: 14px; background: #0A1018;
    border: 1.5px solid #1E2B3E; border-radius: 12px;
    color: #E8EDF3; outline: none; transition: border 0.2s;
    font-family: inherit;
  }
  .input-wrap input:focus { border-color: #10D876; box-shadow: 0 0 0 3px rgba(16,216,107,0.08); }
  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 4px;
    color: #6E7A8E; font-size: 18px; line-height: 1;
  }
  .toggle-pw:hover { color: #E8EDF3; }
  /* Strength bar */
  .strength-wrap { margin-top: 8px; }
  .strength-bar { height: 3px; border-radius: 2px; transition: all 0.3s; width: 0; }
  .strength-bar.empty { width: 0; }
  .strength-bar.weak { width: 25%; background: #F05A7E; }
  .strength-bar.fair { width: 50%; background: #F4A538; }
  .strength-bar.good { width: 75%; background: #0ED86B; opacity: 0.7; }
  .strength-bar.strong { width: 100%; background: #10D876; }
  .strength-text { font-size: 10px; margin-top: 4px; color: #4A5568; }
  .strength-text.weak { color: #F05A7E; }
  .strength-text.fair { color: #F4A538; }
  .strength-text.good { color: #0ED86B; }
  .strength-text.strong { color: #10D876; }
  /* Tips */
  .tips { font-size: 10px; color: #4A5568; margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
  .tips span { display: inline-flex; align-items: center; gap: 3px; }
  .tips .met { color: #10D876; }
  .btn {
    width: 100%; padding: 15px; background: #10D876; color: #060B14;
    border: none; border-radius: 14px; font-size: 14px; font-weight: 700;
    cursor: pointer; margin-top: 6px; transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .btn:hover { background: #0ED86B; box-shadow: 0 4px 20px rgba(16,216,107,0.25); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-loading { display: none; align-items: center; justify-content: center; gap: 10px; margin-top: 6px; }
  .spinner { width: 18px; height: 18px; border: 2px solid transparent; border-top-color: #10D876; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Success */
  .success { display: none; text-align: center; }
  .success.show { display: block; }
  .success .check { width: 56px; height: 56px; border-radius: 50%; background: rgba(16,216,107,0.1); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px; }
  .success h2 { color: #10D876; margin-bottom: 6px; }
  .success p { color: #96A2B3; font-size: 13px; margin-bottom: 24px; line-height: 1.5; }
  .success .btn { text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: auto; padding: 14px 36px; }
  .link-hint { font-size: 11px; color: #4A5568; margin-top: 14px; }
  .link-hint code { color: #10D876; word-break: break-all; font-size: 10px; }
</style>
</head>
<body>

<div class="card" id="form-card">
  <div class="logo-wrap"><img src="/logo-128.png" alt="PolyVision" /></div>
  <h1>Set Your Password</h1>
  <p class="sub">Choose a strong password to activate your PolyVision account.</p>
  <div class="error" id="error"></div>

  <div class="field">
    <label>New Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="At least 6 characters" minlength="6" oninput="checkStrength()" />
      <button class="toggle-pw" id="toggle-pw" onclick="togglePassword('password','toggle-pw')" title="Show password">👁</button>
    </div>
    <div class="strength-wrap">
      <div class="strength-bar empty" id="strength-bar"></div>
      <div class="strength-text" id="strength-text"></div>
    </div>
    <div class="tips" id="tips">
      <span id="tip-len">≥6 chars</span>
      <span id="tip-mix">Aa+num</span>
    </div>
  </div>

  <div class="field">
    <label>Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Re-enter password" minlength="6" oninput="checkMatch()" />
      <button class="toggle-pw" id="toggle-cf" onclick="togglePassword('confirm','toggle-cf')" title="Show password">👁</button>
    </div>
  </div>

  <button class="btn" id="submit-btn" onclick="handleSubmit()">Set Password &amp; Open App</button>
  <div class="btn-loading" id="btn-loading">
    <div class="spinner"></div>
    <span style="color:#6E7A8E;font-size:13px;">Setting password...</span>
  </div>
</div>

<div class="card success" id="success-card">
  <div class="check"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10D876" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
  <h2>Password Set!</h2>
  <p>Your account is ready. Click below to open the app — you'll be signed in automatically.</p>
  <a class="btn" id="open-app-btn" href="#">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
    Open PolyVision
  </a>
  <p class="link-hint">Link not working? Copy this:<br/><code id="fallback-link"></code></p>
</div>

<script>
  // Parse token
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token') || '';
  if (!token) {
    var parts = window.location.pathname.split('/reset-password/');
    token = (parts[1] || '').replace(/\/$/, '');
  }
  if (!token) {
    var parts2 = window.location.pathname.split('/set-password/');
    token = (parts2[1] || '').replace(/\/$/, '');
  }
  if (!token) {
    document.getElementById('error').textContent = 'Invalid reset link. No token found.';
    document.getElementById('error').classList.add('show');
  }

  function togglePassword(inputId, btnId) {
    var inp = document.getElementById(inputId);
    var btn = document.getElementById(btnId);
    if (inp.type === 'password') {
      inp.type = 'text'; btn.textContent = '🙈';
    } else {
      inp.type = 'password'; btn.textContent = '👁';
    }
  }

  function checkStrength() {
    var pw = document.getElementById('password').value;
    var bar = document.getElementById('strength-bar');
    var txt = document.getElementById('strength-text');
    var tipLen = document.getElementById('tip-len');
    var tipMix = document.getElementById('tip-mix');

    // Reset
    bar.className = 'strength-bar empty'; txt.className = 'strength-text'; txt.textContent = '';
    tipLen.className = ''; tipMix.className = '';

    if (!pw) return;

    var score = 0;
    if (pw.length >= 6) { score++; tipLen.classList.add('met'); }
    if (pw.length >= 8) score++;
    if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) { score++; tipMix.classList.add('met'); }
    if (/\d/.test(pw)) { score++; tipMix.classList.add('met'); }
    if (/[^a-zA-Z0-9]/.test(pw)) score++;

    var level, label;
    if (score <= 1) { level = 'weak'; label = 'Weak'; }
    else if (score <= 2) { level = 'fair'; label = 'Fair'; }
    else if (score <= 3) { level = 'good'; label = 'Good'; }
    else { level = 'strong'; label = 'Strong'; }

    bar.className = 'strength-bar ' + level;
    txt.className = 'strength-text ' + level;
    txt.textContent = label + ' password';
  }

  function checkMatch() {
    var pw = document.getElementById('password').value;
    var cf = document.getElementById('confirm').value;
    // Visual feedback could be added here
  }

  async function handleSubmit() {
    var pw = document.getElementById('password').value;
    var cf = document.getElementById('confirm').value;
    var err = document.getElementById('error');
    var btn = document.getElementById('submit-btn');
    var loading = document.getElementById('btn-loading');

    err.classList.remove('show');
    if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.classList.add('show'); return; }
    if (pw !== cf) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }

    btn.style.display = 'none'; loading.style.display = 'flex';

    try {
      var resp = await fetch('https://vns-track.de.r.appspot.com/auth/reset-password-web', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reset_token: token, new_password: pw })
      });
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || 'Failed to reset password');

      var encodedToken = encodeURIComponent(data.auto_login_token);
      var deepLink = 'https://polyvision.shiot.in/open?auto_login=' + encodedToken;
      var intentLink = 'intent://polyvision.shiot.in/open?auto_login=' + encodedToken + '#Intent;scheme=https;package=com.shiotvstrack;S.browser_fallback_url=' + encodeURIComponent(deepLink) + ';end';

      document.getElementById('open-app-btn').href = intentLink;
      document.getElementById('fallback-link').textContent = deepLink;
      document.getElementById('form-card').style.display = 'none';
      document.getElementById('success-card').classList.add('show');

      setTimeout(function() { window.location = intentLink; }, 500);
    } catch (e) {
      err.textContent = e.message;
      err.classList.add('show');
      btn.style.display = ''; loading.style.display = 'none';
    }
  }
</script>
</body>
</html>
