<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Set Password — PolyVision</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
  
  :root {
    --bg-deep: #030509;
    --surface: rgba(15, 22, 36, 0.65);
    --neon-green: #0ED86B;
    --neon-glow: rgba(14, 216, 107, 0.4);
    --text-main: #FFFFFF;
    --text-muted: #96A2B3;
    --border-light: rgba(14, 216, 107, 0.15);
    --error-red: #F05A7E;
    --warn-orange: #F4A538;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background-color: var(--bg-deep);
    background-image: radial-gradient(circle at 50% 0%, #0a1a15 0%, var(--bg-deep) 60%);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    color: var(--text-main); 
    padding: 24px;
    overflow-x: hidden;
  }

  /* Cinematic entrance animation */
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .card {
    max-width: 420px; 
    width: 100%;
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-top: 1px solid var(--border-light);
    border-radius: 28px; 
    padding: 40px 32px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    position: relative;
    z-index: 10;
  }

  /* Subtle background ambient glow behind the card */
  .card::before {
    content: '';
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 100px;
    background: var(--neon-glow);
    filter: blur(80px);
    z-index: -1;
    opacity: 0.5;
    pointer-events: none;
  }

  .logo-wrap { text-align: center; margin-bottom: 24px; }
  .logo-wrap img { width: 56px; height: 56px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  
  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; text-align: center; margin-bottom: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
  .sub { color: var(--text-muted); font-size: 14px; text-align: center; margin-bottom: 28px; line-height: 1.5; }
  
  .error { 
    background: rgba(240, 90, 126, 0.1);
    border: 1px solid rgba(240, 90, 126, 0.3);
    color: var(--error-red); 
    font-size: 13px; 
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 20px; 
    display: none; 
    font-weight: 500;
  }
  .error.show { display: block; animation: fadeUp 0.3s ease; }
  
  .field { margin-bottom: 20px; position: relative; }
  .field label { 
    display: block; 
    font-size: 11px; 
    color: var(--text-muted); 
    margin-bottom: 8px; 
    font-weight: 700; 
    text-transform: uppercase; 
    letter-spacing: 1.5px;
    font-family: 'JetBrains Mono', monospace; 
  }
  
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%; 
    padding: 14px 44px 14px 16px; 
    font-size: 14px; 
    background: rgba(0, 0, 0, 0.4); 
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px; 
    color: var(--text-main); 
    outline: none; 
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .input-wrap input:focus { 
    border-color: var(--neon-green); 
    box-shadow: 0 0 0 4px rgba(14, 216, 107, 0.1); 
  }
  
  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 4px;
    color: var(--text-muted); font-size: 18px; line-height: 1;
    transition: color 0.2s ease;
  }
  .toggle-pw:hover { color: var(--text-main); }
  
  /* Strength bar */
  .strength-wrap { margin-top: 10px; }
  .strength-bar { height: 4px; border-radius: 2px; transition: all 0.3s ease; width: 0; }
  .strength-bar.empty { width: 0; }
  .strength-bar.weak { width: 25%; background: var(--error-red); box-shadow: 0 0 8px rgba(240, 90, 126, 0.4); }
  .strength-bar.fair { width: 50%; background: var(--warn-orange); box-shadow: 0 0 8px rgba(244, 165, 56, 0.4); }
  .strength-bar.good { width: 75%; background: #0ED86B; opacity: 0.7; }
  .strength-bar.strong { width: 100%; background: var(--neon-green); box-shadow: 0 0 8px var(--neon-glow); }
  
  .strength-text { font-size: 11px; margin-top: 6px; font-weight: 500; }
  .strength-text.weak { color: var(--error-red); }
  .strength-text.fair { color: var(--warn-orange); }
  .strength-text.good { color: #0ED86B; }
  .strength-text.strong { color: var(--neon-green); }
  
  /* Tips */
  .tips { font-size: 11px; color: var(--text-muted); margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
  .tips span { display: inline-flex; align-items: center; gap: 4px; transition: color 0.2s ease; }
  .tips .met { color: var(--neon-green); }
  
  .btn {
    width: 100%; 
    padding: 16px; 
    background: var(--neon-green); 
    color: #000000;
    border: none; 
    border-radius: 14px; 
    font-size: 15px; 
    font-weight: 700;
    cursor: pointer; 
    margin-top: 12px; 
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 4px 14px rgba(14, 216, 107, 0.2);
  }
  .btn:hover { 
    background: #10f077; 
    box-shadow: 0 8px 24px rgba(14, 216, 107, 0.4); 
    transform: translateY(-2px); 
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
  
  .btn-loading { display: none; align-items: center; justify-content: center; gap: 10px; margin-top: 12px; padding: 16px; }
  .spinner { width: 20px; height: 20px; border: 3px solid rgba(14, 216, 107, 0.2); border-top-color: var(--neon-green); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* Success */
  .success { display: none; text-align: center; }
  .success.show { display: block; }
  .success .check { 
    width: 64px; height: 64px; 
    border-radius: 50%; 
    background: rgba(14, 216, 107, 0.1); 
    border: 1px solid var(--border-light);
    display: inline-flex; align-items: center; justify-content: center; 
    margin-bottom: 20px; 
  }
  .success h2 { font-size: 24px; color: var(--text-main); margin-bottom: 12px; font-weight: 800; }
  .success p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
  .success .btn { text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
  
  .link-hint { font-size: 12px; color: #4A5568; margin-top: 20px; line-height: 1.6; }
  .link-hint code { 
    display: block;
    margin-top: 8px;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    color: var(--neon-green);
    word-break: break-all;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border: 1px solid rgba(255,255,255,0.05); 
  }
</style>
</head>
<body>

<div class="card" id="form-card">
  <div class="logo-wrap"><img src="/logo-128.png" alt="PolyVision" /></div>
  <h1>Set Your Password</h1>
  <p class="sub">Choose a strong password to activate your PolyVision account.</p>
  <div class="error" id="error"></div>

  <div class="field">
    <label>New Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="At least 6 characters" minlength="6" oninput="checkStrength()" />
      <button class="toggle-pw" id="toggle-pw" onclick="togglePassword('password','toggle-pw')" title="Show password">👁</button>
    </div>
    <div class="strength-wrap">
      <div class="strength-bar empty" id="strength-bar"></div>
      <div class="strength-text" id="strength-text"></div>
    </div>
    <div class="tips" id="tips">
      <span id="tip-len">≥6 chars</span>
      <span id="tip-mix">Aa+num</span>
    </div>
  </div>

  <div class="field">
    <label>Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Re-enter password" minlength="6" oninput="checkMatch()" />
      <button class="toggle-pw" id="toggle-cf" onclick="togglePassword('confirm','toggle-cf')" title="Show password">👁</button>
    </div>
  </div>

  <button class="btn" id="submit-btn" onclick="handleSubmit()">Set Password &amp; Open App</button>
  <div class="btn-loading" id="btn-loading">
    <div class="spinner"></div>
    <span style="color:var(--text-muted);font-size:14px;font-weight:600;">Setting password...</span>
  </div>
</div>

<div class="card success" id="success-card">
  <div class="check"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10D876" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
  <h2>Password Set!</h2>
  <p>Your account is ready. Click below to open the app — you'll be signed in automatically.</p>
  <a class="btn" id="open-app-btn" href="#">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
    Open PolyVision
  </a>
  <p class="link-hint">Link not working? Copy this:<br/><code id="fallback-link"></code></p>
</div>

<script>
  // Parse token
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token') || '';
  if (!token) {
    var parts = window.location.pathname.split('/reset-password/');
    token = (parts[1] || '').replace(/\/$/, '');
  }
  if (!token) {
    var parts2 = window.location.pathname.split('/set-password/');
    token = (parts2[1] || '').replace(/\/$/, '');
  }
  if (!token) {
    document.getElementById('error').textContent = 'Invalid reset link. No token found.';
    document.getElementById('error').classList.add('show');
  }

  function togglePassword(inputId, btnId) {
    var inp = document.getElementById(inputId);
    var btn = document.getElementById(btnId);
    if (inp.type === 'password') {
      inp.type = 'text'; btn.textContent = '🙈';
    } else {
      inp.type = 'password'; btn.textContent = '👁';
    }
  }

  function checkStrength() {
    var pw = document.getElementById('password').value;
    var bar = document.getElementById('strength-bar');
    var txt = document.getElementById('strength-text');
    var tipLen = document.getElementById('tip-len');
    var tipMix = document.getElementById('tip-mix');

    // Reset
    bar.className = 'strength-bar empty'; txt.className = 'strength-text'; txt.textContent = '';
    tipLen.className = ''; tipMix.className = '';

    if (!pw) return;

    var score = 0;
    if (pw.length >= 6) { score++; tipLen.classList.add('met'); }
    if (pw.length >= 8) score++;
    if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) { score++; tipMix.classList.add('met'); }
    if (/\d/.test(pw)) { score++; tipMix.classList.add('met'); }
    if (/[^a-zA-Z0-9]/.test(pw)) score++;

    var level, label;
    if (score <= 1) { level = 'weak'; label = 'Weak'; }
    else if (score <= 2) { level = 'fair'; label = 'Fair'; }
    else if (score <= 3) { level = 'good'; label = 'Good'; }
    else { level = 'strong'; label = 'Strong'; }

    bar.className = 'strength-bar ' + level;
    txt.className = 'strength-text ' + level;
    txt.textContent = label + ' password';
  }

  function checkMatch() {
    var pw = document.getElementById('password').value;
    var cf = document.getElementById('confirm').value;
    // Visual feedback could be added here
  }

  async function handleSubmit() {
    var pw = document.getElementById('password').value;
    var cf = document.getElementById('confirm').value;
    var err = document.getElementById('error');
    var btn = document.getElementById('submit-btn');
    var loading = document.getElementById('btn-loading');

    err.classList.remove('show');
    if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.classList.add('show'); return; }
    if (pw !== cf) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }

    btn.style.display = 'none'; loading.style.display = 'flex';

    try {
      var resp = await fetch('https://vns-track.de.r.appspot.com/auth/reset-password-web', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reset_token: token, new_password: pw })
      });
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || 'Failed to reset password');

      var encodedToken = encodeURIComponent(data.auto_login_token);
      var deepLink = 'https://polyvision.shiot.in/open?auto_login=' + encodedToken;
      var intentLink = 'intent://polyvision.shiot.in/open?auto_login=' + encodedToken + '#Intent;scheme=https;package=com.shiotvstrack;S.browser_fallback_url=' + encodeURIComponent(deepLink) + ';end';

      document.getElementById('open-app-btn').href = intentLink;
      document.getElementById('fallback-link').textContent = deepLink;
      document.getElementById('form-card').style.display = 'none';
      document.getElementById('success-card').classList.add('show');

      setTimeout(function() { window.location = intentLink; }, 500);
    } catch (e) {
      err.textContent = e.message;
      err.classList.add('show');
      btn.style.display = ''; loading.style.display = 'none';
    }
  }
</script>
</body>
</html>
