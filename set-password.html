<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Set Password — PolyVision</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060B14; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    color: #E8EDF3; padding: 24px;
  }
  .card { max-width: 400px; width: 100%; background: #0E1420; border: 1px solid #1E2B3E; border-radius: 20px; padding: 36px 28px; text-align: center; }
  .logo { margin-bottom: 20px; }
  .logo img { width: 48px; height: 48px; border-radius: 12px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .sub { color: #6E7A8E; font-size: 13px; margin-bottom: 24px; line-height: 1.5; }
  .field { margin-bottom: 16px; text-align: left; }
  .field label { display: block; font-size: 11px; color: #6E7A8E; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .field input {
    width: 100%; padding: 12px 14px; font-size: 14px; background: #0A1018; border: 1px solid #1E2B3E;
    border-radius: 10px; color: #E8EDF3; outline: none; transition: border 0.2s;
  }
  .field input:focus { border-color: #10D876; }
  .error { color: #F05A7E; font-size: 12px; margin-bottom: 12px; display: none; }
  .error.show { display: block; }
  .btn {
    width: 100%; padding: 14px; background: #10D876; color: #060B14; border: none;
    border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .success { display: none; }
  .success.show { display: block; }
  .success h2 { color: #10D876; margin-bottom: 8px; }
  .success p { color: #96A2B3; font-size: 13px; margin-bottom: 20px; }
  .success .btn { background: #10D876; text-decoration: none; display: inline-block; width: auto; padding: 14px 32px; }
  .spinner { display: none; width: 20px; height: 20px; border: 2px solid #060B14; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card" id="form-card">
  <div class="logo"><img src="/logo-128.png" alt="PolyVision" /></div>
  <h1>Set Your Password</h1>
  <p class="sub">Choose a password to activate your account.</p>
  <div class="error" id="error"></div>
  <div class="field">
    <label>New Password</label>
    <input type="password" id="password" placeholder="Min 6 characters" minlength="6" />
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Re-enter password" minlength="6" />
  </div>
  <button class="btn" id="submit-btn" onclick="handleSubmit()">Set Password & Open App</button>
  <div class="spinner" id="spinner"></div>
</div>

<div class="card success" id="success-card">
  <div class="logo"><img src="/logo-128.png" alt="PolyVision" /></div>
  <h2>Password Set!</h2>
  <p>Your account is ready. Click below to open the app — you'll be signed in automatically.</p>
  <a class="btn" id="open-app-btn" href="#">Open PolyVision</a>
  <p style="font-size:11px;color:#4A5568;margin-top:14px;">Copy this link if the button doesn't work:<br/><code id="fallback-link" style="color:#10D876;word-break:break-all;"></code></p>
</div>

<script>
  // Parse token from query parameter (primary) or path (legacy fallback)
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token') || '';
  if (!token) {
    var parts = window.location.pathname.split('/reset-password/');
    token = (parts[1] || '').replace(/\/$/, '');
  }
  if (!token) {
    var parts2 = window.location.pathname.split('/set-password/');
    token = (parts2[1] || '').replace(/\/$/, '');
  }
  if (!token) {
    document.getElementById('error').textContent = 'Invalid reset link. No token found.';
    document.getElementById('error').classList.add('show');
  }

  async function handleSubmit() {
    var pw = document.getElementById('password').value;
    var cf = document.getElementById('confirm').value;
    var err = document.getElementById('error');
    var btn = document.getElementById('submit-btn');
    var spin = document.getElementById('spinner');

    err.classList.remove('show');
    if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.classList.add('show'); return; }
    if (pw !== cf) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }

    btn.disabled = true; btn.style.display = 'none'; spin.style.display = 'block';

    try {
      var resp = await fetch('https://vns-track.de.r.appspot.com/auth/reset-password-web', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reset_token: token, new_password: pw })
      });
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || 'Failed to reset password');
      
      // Got auto-login token — build app links
      var encodedToken = encodeURIComponent(data.auto_login_token);
      var deepLink = 'https://polyvision.shiot.in/open?auto_login=' + encodedToken;
      // Android intent link (opens app directly)
      var intentLink = 'intent://polyvision.shiot.in/open?auto_login=' + encodedToken + '#Intent;scheme=https;package=com.shiotvstrack;S.browser_fallback_url=' + encodeURIComponent(deepLink) + ';end';
      
      document.getElementById('open-app-btn').href = intentLink;
      document.getElementById('fallback-link').textContent = deepLink;
      document.getElementById('form-card').style.display = 'none';
      document.getElementById('success-card').classList.add('show');
      
      // Auto-open app
      setTimeout(function() { window.location = intentLink; }, 500);
    } catch (e) {
      err.textContent = e.message;
      err.classList.add('show');
      btn.disabled = false; btn.style.display = ''; spin.style.display = 'none';
    }
  }
</script>
</body>
</html>
