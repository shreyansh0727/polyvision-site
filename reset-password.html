<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Set Password — PolyVision</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
  
  :root {
    --bg-deep: #030509;
    --surface: rgba(15, 22, 36, 0.65);
    --neon-green: #0ED86B;
    --neon-glow: rgba(14, 216, 107, 0.4);
    --text-main: #FFFFFF;
    --text-muted: #96A2B3;
    --border-light: rgba(14, 216, 107, 0.15);
    --error-red: #F05A7E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background-color: var(--bg-deep);
    background-image: radial-gradient(circle at 50% 0%, #0a1a15 0%, var(--bg-deep) 60%);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    color: var(--text-main); 
    padding: 24px;
    overflow-x: hidden;
  }

  /* Cinematic entrance animation */
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .card { 
    max-width: 420px; 
    width: 100%; 
    background: var(--surface); 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    border-top: 1px solid var(--border-light);
    border-radius: 28px; 
    padding: 40px 32px; 
    text-align: center;
    backdrop-filter: blur(24px); 
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    position: relative;
    z-index: 10;
  }

  /* Subtle background ambient glow behind the card */
  .card::before {
    content: '';
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 100px;
    background: var(--neon-glow);
    filter: blur(80px);
    z-index: -1;
    opacity: 0.5;
    pointer-events: none;
  }

  .logo { margin-bottom: 24px; }
  .logo img { width: 56px; height: 56px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  
  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
  .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
  
  .field { margin-bottom: 20px; text-align: left; }
  .field label { 
    display: block; 
    font-size: 11px; 
    color: var(--text-muted); 
    margin-bottom: 8px; 
    font-weight: 700; 
    text-transform: uppercase; 
    letter-spacing: 1.5px;
    font-family: 'JetBrains Mono', monospace; 
  }
  .field input {
    width: 100%; 
    padding: 14px 16px; 
    font-size: 14px; 
    background: rgba(0, 0, 0, 0.4); 
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px; 
    color: var(--text-main); 
    outline: none; 
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .field input:focus { 
    border-color: var(--neon-green); 
    box-shadow: 0 0 0 4px rgba(14, 216, 107, 0.1); 
  }
  
  .error { 
    background: rgba(240, 90, 126, 0.1);
    border: 1px solid rgba(240, 90, 126, 0.3);
    color: var(--error-red); 
    font-size: 13px; 
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 20px; 
    display: none; 
    font-weight: 500;
  }
  .error.show { display: block; animation: fadeUp 0.3s ease; }
  
  .btn {
    width: 100%; 
    padding: 16px; 
    background: var(--neon-green); 
    color: #000000; 
    border: none;
    border-radius: 14px; 
    font-size: 15px; 
    font-weight: 700; 
    cursor: pointer; 
    margin-top: 8px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 4px 14px rgba(14, 216, 107, 0.2);
  }
  .btn:hover {
    background: #10f077;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(14, 216, 107, 0.4);
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  
  .success { display: none; }
  .success.show { display: block; }
  
  .success-icon {
    width: 64px; height: 64px;
    background: rgba(14, 216, 107, 0.1);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    color: var(--neon-green);
    border: 1px solid var(--border-light);
  }
  
  .success h2 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
  .success p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; line-height: 1.6;}
  .success .btn { text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
  
  .fallback-text { font-size: 12px; color: #4A5568; margin-top: 20px; line-height: 1.6; }
  .fallback-code { 
    display: block;
    margin-top: 8px;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    color: var(--neon-green);
    word-break: break-all;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .spinner { 
    display: none; 
    width: 24px; 
    height: 24px; 
    border: 3px solid rgba(14, 216, 107, 0.2); 
    border-top-color: var(--neon-green); 
    border-radius: 50%; 
    animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
    margin: 16px auto; 
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card" id="form-card">
  <div class="logo"><img src="/logo-128.png" alt="PolyVision" /></div>
  <h1>Set Your Password</h1>
  <p class="sub">Choose a secure password to activate your workspace account.</p>
  
  <div class="error" id="error"></div>
  
  <div class="field">
    <label>New Password</label>
    <input type="password" id="password" placeholder="Minimum 6 characters" minlength="6" />
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Re-enter password" minlength="6" />
  </div>
  
  <button class="btn" id="submit-btn" onclick="handleSubmit()">Set Password & Open App</button>
  <div class="spinner" id="spinner"></div>
</div>

<div class="card success" id="success-card">
  <div class="success-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
  </div>
  <h2>Password Set!</h2>
  <p>Your account is ready. Click below to open the app — you'll be signed in automatically.</p>
  
  <a class="btn" id="open-app-btn" href="#">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
    Open PolyVision
  </a>
  
  <p class="fallback-text">
    If the button doesn't open the app automatically, copy this link:
    <code id="fallback-link" class="fallback-code"></code>
  </p>
</div>

<script>
  var token = (window.location.pathname.split('/reset-password/')[1] || '').replace(/\/$/, '');
  // Fallback: also try query parameter
  if (!token) {
    var params = new URLSearchParams(window.location.search);
    token = params.get('token') || '';
  }
  if (!token) {
    document.getElementById('error').textContent = 'Invalid or expired reset link.';
    document.getElementById('error').classList.add('show');
  }

  async function handleSubmit() {
    var pw = document.getElementById('password').value;
    var cf = document.getElementById('confirm').value;
    var err = document.getElementById('error');
    var btn = document.getElementById('submit-btn');
    var spin = document.getElementById('spinner');

    err.classList.remove('show');
    if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.classList.add('show'); return; }
    if (pw !== cf) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }

    btn.disabled = true; btn.style.display = 'none'; spin.style.display = 'block';

    try {
      var resp = await fetch('https://vns-track.de.r.appspot.com/auth/reset-password-web', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reset_token: token, new_password: pw })
      });
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || 'Failed to reset password');
      
      // Got auto-login token — redirect to app
      var appLink = 'https://polyvision.shiot.in/open?auto_login=' + encodeURIComponent(data.auto_login_token);
      document.getElementById('open-app-btn').href = appLink;
      document.getElementById('fallback-link').textContent = appLink;
      document.getElementById('form-card').style.display = 'none';
      document.getElementById('success-card').classList.add('show');
      
      // Auto-open app
      setTimeout(function() { window.location = appLink; }, 500);
    } catch (e) {
      err.textContent = e.message;
      err.classList.add('show');
      btn.disabled = false; btn.style.display = ''; spin.style.display = 'none';
    }
  }
</script>
</body>
</html>
