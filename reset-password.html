<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — PolyVision</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05080f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eef1f6;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 360px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(16,216,118,0.2);
      border-top-color: #10D876;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #10D876;
      color: #05080f;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(16,216,118,0.3); }
    .fallback { margin-top: 20px; }
    .fallback a { color: #10D876; font-size: 13px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Opening PolyVision…</h1>
    <p id="status">Redirecting you to the app to reset your password.</p>
    <a id="app-link" href="#" class="btn" style="display:none;">Open PolyVision App</a>
    <div class="fallback" id="fallback" style="display:none;">
      <p>If the app didn't open, copy and paste this link in your browser:</p>
      <a id="fallback-link" href="#"></a>
    </div>
  </div>

  <script>
    (function() {
      // Extract the JWT from the URL path: /reset-password/<JWT>
      var path = window.location.pathname;
      var match = path.match(/reset-password\/(.+)$/);
      if (!match) {
        document.getElementById('status').textContent = 'Invalid reset link.';
        return;
      }

      var token = match[1];
      var appUrl = 'employeetracker://reset-password/' + token;
      var webUrl = 'https://polyvision.shiot.in/reset-password/' + token;

      // Try to open the app immediately
      window.location.href = appUrl;

      // Show fallback after 2 seconds if the app didn't open
      setTimeout(function() {
        document.getElementById('status').textContent = "App didn't open automatically.";
        document.getElementById('app-link').href = appUrl;
        document.getElementById('app-link').style.display = 'inline-block';
        document.getElementById('fallback').style.display = 'block';
        document.getElementById('fallback-link').href = webUrl;
        document.getElementById('fallback-link').textContent = webUrl;
        document.querySelector('.spinner').style.display = 'none';
      }, 2000);
    })();
  </script>
</body>
</html>
